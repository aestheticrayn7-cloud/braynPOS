steps:
  # Build the unified Docker image with unique tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://brayn-api-135906948054.africa-south1.run.app'
      - '-t'
      - 'africa-south1-docker.pkg.dev/$PROJECT_ID/braynpos-repo-af/braynpos-unified:$BUILD_ID'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'africa-south1-docker.pkg.dev/$PROJECT_ID/braynpos-repo-af/braynpos-unified:$BUILD_ID']

  # CRITICAL: Remove conflicting GEMINI_API_KEY binding before deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - 'gcloud run services update brayn-api --region=africa-south1 --clear-env-vars --clear-secrets || true'

  # FIX: Clear secret mapping to resolve type conflict (Secret -> EnvVar)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - 'gcloud run services update brayn-api --region=africa-south1 --remove-secrets=GEMINI_API_KEY || true'

  # Deploy API to Cloud Run (with Direct VPC Egress)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'brayn-api'
      - '--image'
      - 'africa-south1-docker.pkg.dev/$PROJECT_ID/braynpos-repo-af/braynpos-unified:$BUILD_ID'
      - '--region'
      - 'africa-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'


      - '--command'
      - 'sh,-c,cd apps/api && pnpm start:prod'
      - '--set-env-vars'
      - 'SERVICE_TYPE=api,GEMINI_API_KEY=pending-setup,DATABASE_URL=postgresql://placeholder:pass@localhost/db,DIRECT_URL=postgresql://placeholder:pass@localhost/db,REDIS_URL=redis://localhost:6379,JWT_SECRET=temporary_secret,CORS_ORIGIN=*'

  # Deploy Web to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'brayn-web'
      - '--image'
      - 'africa-south1-docker.pkg.dev/$PROJECT_ID/braynpos-repo-af/braynpos-unified:$BUILD_ID'
      - '--region'
      - 'africa-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

      - '--command'
      - 'sh,-c,cd apps/web && pnpm start'
      - '--set-env-vars'
      - 'SERVICE_TYPE=web,NEXT_PUBLIC_API_URL=https://brayn-api-135906948054.africa-south1.run.app,DATABASE_URL=postgresql://placeholder:pass@localhost/db,REDIS_URL=redis://localhost:6379,JWT_SECRET=temporary_secret,CORS_ORIGIN=*'

images:
  - 'africa-south1-docker.pkg.dev/$PROJECT_ID/braynpos-repo-af/braynpos-unified:$BUILD_ID'

