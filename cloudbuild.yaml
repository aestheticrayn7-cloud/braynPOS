steps:
  # Build the unified Docker image with unique tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://brayn-api-135906948054.africa-south1.run.app'
      - '-t'
      - 'africa-south1-docker.pkg.dev/$PROJECT_ID/braynpos-repo-af/braynpos-unified:$BUILD_ID'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'africa-south1-docker.pkg.dev/$PROJECT_ID/braynpos-repo-af/braynpos-unified:$BUILD_ID']

  # CRITICAL: Remove conflicting GEMINI_API_KEY binding before deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - 'gcloud run services update brayn-api --region=africa-south1 --clear-env-vars --clear-secrets || true'

  # FIX: Clear secret mapping to resolve type conflict (Secret -> EnvVar)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - 'gcloud run services update brayn-api --region=africa-south1 --remove-secrets=GEMINI_API_KEY || true'

  # Deploy API to Cloud Run (with Direct VPC Egress)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'brayn-api'
      - '--image'
      - 'africa-south1-docker.pkg.dev/$PROJECT_ID/braynpos-repo-af/braynpos-unified:$BUILD_ID'
      - '--region'
      - 'africa-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'braynpos-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--add-cloudsql-instances'
      - '$PROJECT_ID:africa-south1:braynpos-db-af'
      - '--network=braynpos-network'
      - '--subnet=braynpos-subnet-af'
      - '--vpc-egress=private-ranges-only'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,DIRECT_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,JWT_SECRET=JWT_SECRET:latest,CORS_ORIGIN=CORS_ORIGIN:latest'
      - '--command'
      - 'sh,-c,cd apps/api && pnpm exec prisma migrate deploy && pnpm start:prod'
      - '--set-env-vars'
      - 'SERVICE_TYPE=api,GEMINI_API_KEY=pending-setup'

  # Deploy Web to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'brayn-web'
      - '--image'
      - 'africa-south1-docker.pkg.dev/$PROJECT_ID/braynpos-repo-af/braynpos-unified:$BUILD_ID'
      - '--region'
      - 'africa-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'braynpos-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,JWT_SECRET=JWT_SECRET:latest,CORS_ORIGIN=CORS_ORIGIN:latest'
      - '--command'
      - 'sh,-c,cd apps/web && pnpm start'
      - '--set-env-vars'
      - 'SERVICE_TYPE=web,NEXT_PUBLIC_API_URL=https://brayn-api-135906948054.africa-south1.run.app'

images:
  - 'africa-south1-docker.pkg.dev/$PROJECT_ID/braynpos-repo-af/braynpos-unified:$BUILD_ID'

