name: BraynPOS CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: braynpos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm --filter api db:generate

      - name: Run Database Migrations
        run: pnpm --filter api db:migrate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/braynpos_test?schema=public

      - name: Typecheck
        run: pnpm --filter api typecheck

      - name: Run Tests
        run: pnpm --filter api test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/braynpos_test?schema=public
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: ci_test_secret_2026
          NODE_ENV: test
